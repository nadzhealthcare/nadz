# Nginx config for nadz (single config: frontend + admin CMS)
#
# SETUP (run on server):
#   1. Remove old sites:
#      sudo rm -f /etc/nginx/sites-enabled/nadz /etc/nginx/sites-enabled/cms
#   2. Install this config (merges .ae HTTPS 301 fragment if cert exists), enable site, reload:
#      sudo /srv/nadz/scripts/apply-nginx-production.sh
#      [first time only: sudo ln -sf /etc/nginx/sites-available/nadz /etc/nginx/sites-enabled/nadz]
#   3. Test and reload:
#      sudo nginx -t && sudo systemctl reload nginx
#   4. Enable HTTPS for main domain (run once; certbot will add cert paths if missing):
#      sudo certbot --nginx -d nadzhealthcare.com -d www.nadzhealthcare.com
#   4b. Legacy .ae domain: (1) A records for @ and www -> this server. (2) Get cert, then 301 on 443
#        sudo mkdir -p /var/www/html
#        sudo /srv/nadz/scripts/apply-nginx-production.sh
#        sudo certbot certonly --webroot -w /var/www/html -d nadzhomehealthcare.ae -d www.nadzhomehealthcare.ae
#        sudo /srv/nadz/scripts/apply-nginx-production.sh
#   (apply merges nginx-nadz.ae-https-301.fragment when the cert under live/nadzhomehealthcare.ae exists)
#   5. admincms HTTPS: get cert then reload nginx (see step 6).
#   6. Get HTTPS cert for admincms (no www - www.admincms has no DNS): sudo certbot --nginx -d admincms.nadzhealthcare.com
#
# TROUBLESHOOTING:
#   - If https://nadzhealthcare.com doesn't open: run step 4, then sudo nginx -t && sudo systemctl reload nginx
#   - If http://admincms.nadzhealthcare.com/admin returns 404: (1) from server run
#     curl -sI http://127.0.0.1:1337/admin (should be 200). (2) If 200, ensure DNS A record
#     for admincms.nadzhealthcare.com points to this server. (3) Restart Strapi after
#     env changes: pm2 restart strapi
#
# NOTE: This file is the in-repo *production* copy: it includes certbot-managed SSL stanzas.
#       Do not replace it with nginx-nadz.conf alone (that file is a template without certs).

# Frontend (Next.js) - nadzhealthcare.com
server {
    server_name nadzhealthcare.com www.nadzhealthcare.com;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/nadzhealthcare.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/nadzhealthcare.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# Legacy .ae public site -> canonical .com (301, path and query string preserved via $request_uri)
# Do not add admincms.nadzhomehealthcare.ae here — the CMS must stay on its own host.
# /.well-known/ is above the 301 so Let's Encrypt HTTP-01 works. HTTPS 301 for .ae is in
# nginx-nadz.ae-https-301.fragment (merged by apply-nginx-production.sh once the cert exists).
server {
    listen 80;
    listen [::]:80;
    server_name nadzhomehealthcare.ae www.nadzhomehealthcare.ae;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/html;
    }

    return 301 https://nadzhealthcare.com$request_uri;
}

# HTTPS for main domain: certbot adds a 443 block when you run:
#   sudo certbot --nginx -d nadzhealthcare.com -d www.nadzhealthcare.com

# Backend (Strapi CMS) - admincms.nadzhealthcare.com (no www - www has no DNS)
# HTTPS: sudo certbot --nginx -d admincms.nadzhealthcare.com
server {
    server_name admincms.nadzhealthcare.com;

    client_max_body_size 100M;

    location = /admin {
        return 301 /admin/;
    }

    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    location / {
        proxy_pass http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        add_header X-Served-By "strapi-admin" always;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/admincms.nadzhealthcare.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/admincms.nadzhealthcare.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.nadzhealthcare.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = nadzhealthcare.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name nadzhealthcare.com www.nadzhealthcare.com;
    return 404; # managed by Certbot
}

server {
    if ($host = admincms.nadzhealthcare.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name admincms.nadzhealthcare.com;
    return 404; # managed by Certbot
}
