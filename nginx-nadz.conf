# Nginx config for nadz (single config: frontend + admin CMS)
#
# If this server already uses certbot (HTTPS on .com / admincms), do NOT overwrite
# /etc/nginx/sites-available/nadz with this file alone — you would remove SSL.
# Use nginx-nadz.production.conf + scripts/apply-nginx-production.sh (see that file’s header).
#
# SETUP (run on server):
#   1. Remove old sites:
#      sudo rm -f /etc/nginx/sites-enabled/nadz /etc/nginx/sites-enabled/cms
#   2. Copy and enable this config:
#      sudo cp /srv/nadz/nginx-nadz.conf /etc/nginx/sites-available/nadz
#      sudo ln -sf /etc/nginx/sites-available/nadz /etc/nginx/sites-enabled/nadz
#   3. Test and reload:
#      sudo nginx -t && sudo systemctl reload nginx
#   4. Enable HTTPS for main domain (run once; certbot will add cert paths if missing):
#      sudo certbot --nginx -d nadzhealthcare.com -d www.nadzhealthcare.com
#   4b. Legacy .ae domain (optional): after DNS for nadzhomehealthcare.ae / www point here, get HTTPS;
#        ensure both port 80 and 443 for .ae only return 301 to https://nadzhealthcare.com$request_uri
#        sudo certbot --nginx -d nadzhomehealthcare.ae -d www.nadzhomehealthcare.ae
#   5. admincms HTTPS: get cert then reload nginx (see step 6).
#   6. Get HTTPS cert for admincms (no www - www.admincms has no DNS): sudo certbot --nginx -d admincms.nadzhealthcare.com
#
# TROUBLESHOOTING:
#   - If https://nadzhealthcare.com doesn't open: run step 4, then sudo nginx -t && sudo systemctl reload nginx
#   - If http://admincms.nadzhealthcare.com/admin returns 404: (1) from server run
#     curl -sI http://127.0.0.1:1337/admin (should be 200). (2) If 200, ensure DNS A record
#     for admincms.nadzhealthcare.com points to this server. (3) Restart Strapi after
#     env changes: pm2 restart strapi

# Frontend (Next.js) - nadzhealthcare.com (HTTP)
server {
    listen 80;
    listen [::]:80;
    server_name nadzhealthcare.com www.nadzhealthcare.com;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Legacy .ae public site -> canonical .com (301, path and query string preserved via $request_uri)
# Do not add admincms.nadzhomehealthcare.ae here — the CMS must stay on its own host.
# For HTTPS, add a 443 block with a cert (see nginx-nadz.production.conf) and a /.well-known/ location
# on port 80 so certbot HTTP-01 is not lost to the 301.
server {
    listen 80;
    listen [::]:80;
    server_name nadzhomehealthcare.ae www.nadzhomehealthcare.ae;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/html;
    }

    return 301 https://nadzhealthcare.com$request_uri;
}

# HTTPS for main domain: certbot adds a 443 block when you run:
#   sudo certbot --nginx -d nadzhealthcare.com -d www.nadzhealthcare.com

# Backend (Strapi CMS) - admincms.nadzhealthcare.com (no www - www has no DNS)
# HTTPS: sudo certbot --nginx -d admincms.nadzhealthcare.com
server {
    listen 80;
    listen [::]:80;
    server_name admincms.nadzhealthcare.com;

    client_max_body_size 100M;

    location = /admin {
        return 301 /admin/;
    }

    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    location / {
        proxy_pass http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        add_header X-Served-By "strapi-admin" always;
    }
}
